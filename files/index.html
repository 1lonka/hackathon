    <div class="hero-vignette"></div>
    <div class="hero-glow"></div>

    <div class="hero-content">
      <h1 class="hero-title" style="margin-top:2.5rem;">The Evolution<br>of Cameras</h1>
      <p class="hero-subtitle">
        From the Camera Obscura to mirrorless marvels — explore how photography evolved
        over five centuries of light, chemistry, and innovation.
      </p>
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Camera_obscura_illustration_18th_century.png" alt="Old Camera" style="margin-top:2rem; max-width:320px; border-radius:8px; box-shadow:0 4px 24px rgba(0,0,0,0.25);">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Camera_obscura_illustration_18th_century.png" alt="Old Camera" class="hero-cam-img">

  <!-- ══ TIMELINE ════════════════════════════ -->
  <section id="timeline">

    <div class="sec-div">
      <div class="div-line"></div>
      <div class="div-line"></div>
    </div>

    <div class="cam-stage">

      <!-- Prev arrow -->
      <button class="arr-btn" id="prevBtn" aria-label="Previous camera">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>

      <!-- Camera card -->
      <div class="cam-display" id="camDisplay">
        <div class="cam-frame" id="camFrame">
          <div class="c-tr"></div>
          <div class="c-bl"></div>
          <div class="cam-inner">
            <div class="cam-svg-wrap" id="camSvgWrap"></div>
            <div class="cam-hint"><span>Explore ↗</span></div>
          </div>
        </div>
        <h2 class="cam-name" id="camName"></h2>
        <p  class="cam-era"  id="camEra"></p>
        <p  class="cam-desc" id="camDesc"></p>
        <p  class="cam-count"><b id="camIdx">1</b> / 9</p>
      </div>

      <!-- Next arrow -->
      <button class="arr-btn" id="nextBtn" aria-label="Next camera">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

    </div>

    <!-- Timeline bar — no year labels, tooltip only on hover/active -->
    <div class="tl-outer">
      <div class="tl-track">
        <div class="tl-fill"     id="tlFill"></div>
        <div class="tl-dots-row" id="tlDots"></div>
      </div>
    </div>

  </section>

  <script src="cameras.js"></script>
  <script src="main.js"></script>
</body>
</html>
